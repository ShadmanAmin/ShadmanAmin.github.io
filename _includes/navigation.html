<div class="nav">
  <h3 class="nav-title">Menu</h3>
  <a href="#" class="nav-close"><span class="hidden">Close</span></a>
  <ul>
    {%- for item in site.nav -%}
    <li class="nav-{{ item.title | slugify }}{% if page.url == item.url %} nav-current{% endif %}" role="presentation">
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
    </li>
    {%- endfor -%}
  </ul>
  <a class="subscribe-button icon-feed" href="{{ '/feed.xml' | relative_url }}">Subscribe</a>
</div>
<span class="nav-cover"></span>
