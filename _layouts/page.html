---
layout: default
class: 'page-template'
---
{% include site-header.html cover=page.cover title=page.title subtitle=page.subtitle %}

<main class="content" role="main">
  <article class="post">
    {%- unless page.cover %}
    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      {%- if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif -%}
    </header>
    {% endunless -%}

    <section class="post-content">
      {{ content }}
    </section>
  </article>
</main>
